<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transcribe — YouTube se text</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14110f;
    --surface: #1d1916;
    --surface-2: #262019;
    --line: #36302a;
    --ink: #f3ede4;
    --muted: #a89e90;
    --faint: #6f655a;
    --accent: #ff6a4d;
    --accent-soft: #ff6a4d22;
    --ok: #7bd88f;
    --warn: #f5c542;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    background-image: radial-gradient(900px 500px at 80% -10%, #ff6a4d14, transparent 70%);
    padding: clamp(20px, 4vw, 48px);
  }
  .wrap { max-width: 780px; margin: 0 auto; }

  header { margin-bottom: clamp(24px, 4vw, 40px); }
  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
  }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800; letter-spacing: -0.02em; line-height: 1.02;
    font-size: clamp(34px, 8vw, 58px);
  }
  h1 .em { color: var(--accent); }
  .sub { color: var(--muted); margin-top: 12px; font-size: clamp(15px, 3.5vw, 17px); max-width: 46ch; }

  /* input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: clamp(16px, 3vw, 24px);
    margin-top: clamp(20px, 4vw, 32px);
  }
  .field { display: flex; flex-direction: column; gap: 10px; }
  label {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint);
  }
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
  input[type="text"] {
    flex: 1 1 240px;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    font-size: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    font-family: "Inter", sans-serif;
    transition: border-color .15s, box-shadow .15s;
    min-width: 0;
  }
  input[type="text"]:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input[type="text"]::placeholder { color: var(--faint); }
  button.primary {
    background: var(--accent); color: #1a0d08; border: none;
    font-family: "Bricolage Grotesque", sans-serif; font-weight: 700;
    font-size: 16px; padding: 14px 22px; border-radius: 12px;
    cursor: pointer; transition: transform .08s, filter .15s;
    flex: 0 0 auto; white-space: nowrap;
  }
  button.primary:hover:not(:disabled) { filter: brightness(1.08); }
  button.primary:active:not(:disabled) { transform: translateY(1px); }
  button.primary:disabled { opacity: .55; cursor: not-allowed; }

  .opts { display: flex; gap: 18px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 14px; color: var(--muted); }
  .toggle input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .lang { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); }
  .lang select {
    background: var(--bg); color: var(--ink); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 10px; font-family: "Inter"; font-size: 14px;
    cursor: pointer;
  }
  .lang select:focus { outline: none; border-color: var(--accent); }

  /* messages */
  .msg { margin-top: 14px; font-size: 14px; border-radius: 12px; padding: 12px 16px; display: none; }
  .msg.err { display: block; background: #ff6a4d10; border: 1px solid #ff6a4d44; color: #ffb9a8; }
  .msg.warn { display: block; background: #f5c54210; border: 1px solid #f5c54244; color: #f5c542; }
  .loading { display: none; margin-top: 22px; align-items: center; gap: 12px; color: var(--muted); font-size: 14px; }
  .loading.on { display: flex; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* result */
  .result { display: none; margin-top: clamp(24px, 4vw, 36px); }
  .result.on { display: block; animation: rise .4s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .result-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .meta { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--faint); letter-spacing: .04em; }
  .meta b { color: var(--ok); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .ghost {
    background: var(--surface-2); color: var(--ink); border: 1px solid var(--line);
    font-size: 13px; font-weight: 600; padding: 9px 14px; border-radius: 10px;
    font-family: "Inter"; flex: 0 0 auto; cursor: pointer;
    transition: border-color .15s, transform .08s;
  }
  .ghost:hover { border-color: var(--accent); }
  .ghost:active { transform: translateY(1px); }

  .transcript {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: clamp(16px, 3vw, 24px);
    max-height: 60vh; overflow-y: auto;
    font-size: 15.5px; line-height: 1.85;
  }
  .transcript.plain { white-space: pre-wrap; word-break: break-word; color: var(--ink); }
  .line { display: flex; gap: 14px; padding: 5px 0; border-bottom: 1px solid #36302a30; }
  .line:last-child { border-bottom: none; }
  .line .t {
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    color: var(--accent); flex: 0 0 auto; padding-top: 4px; min-width: 56px;
    user-select: none;
  }
  .line .x { color: var(--ink); }
  .transcript::-webkit-scrollbar { width: 8px; }
  .transcript::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

  /* word count badge */
  .badge {
    display: inline-block; background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--muted);
    font-family: "JetBrains Mono", monospace; margin-left: 8px;
  }

  footer { margin-top: 40px; color: var(--faint); font-size: 13px; text-align: center; }

  @media (max-width: 480px) {
    .input-row button.primary { flex: 1 1 100%; }
    .line { gap: 10px; }
    .line .t { min-width: 48px; }
    .actions { width: 100%; }
    .ghost { flex: 1; text-align: center; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Speech → Text</div>
    <h1>YouTube ko <span class="em">transcript</span> bana lo.</h1>
    <p class="sub">Koi bhi video, shorts ya youtu.be link paste karo — pura transcript turant, timestamps ke saath ya plain text. Copy karo ya download.</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="url">Video link ya ID</label>
      <div class="input-row">
        <input id="url" type="text" inputmode="url" autocomplete="off"
               placeholder="https://www.youtube.com/watch?v=… ya youtu.be/… ya Shorts link" />
        <button class="primary" id="go">Transcript banao →</button>
      </div>
    </div>

    <div class="opts">
      <label class="toggle" for="ts">
        <input type="checkbox" id="ts" checked />
        Timestamps dikhao
      </label>
      <div class="lang">
        <span>Language</span>
        <select id="lang">
          <option value="">Auto (default)</option>
          <option value="en">🇺🇸 English</option>
          <option value="ur">🇵🇰 Urdu</option>
          <option value="hi">🇮🇳 Hindi</option>
          <option value="ar">🇸🇦 Arabic</option>
          <option value="es">🇪🇸 Spanish</option>
          <option value="fr">🇫🇷 French</option>
          <option value="de">🇩🇪 German</option>
          <option value="pt">🇧🇷 Portuguese</option>
          <option value="ru">🇷🇺 Russian</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="ko">🇰🇷 Korean</option>
          <option value="zh-Hans">🇨🇳 Chinese (Simplified)</option>
          <option value="zh-Hant">🇹🇼 Chinese (Traditional)</option>
          <option value="tr">🇹🇷 Turkish</option>
          <option value="id">🇮🇩 Indonesian</option>
        </select>
      </div>
    </div>

    <div class="msg" id="err"></div>
    <div class="loading" id="loading"><div class="spinner"></div> Transcript la rahe hain…</div>
  </div>

  <section class="result" id="result">
    <div class="result-head">
      <div class="meta" id="meta"></div>
      <div class="actions">
        <button class="ghost" id="copy">📋 Copy</button>
        <button class="ghost" id="download">⬇️ Download .txt</button>
      </div>
    </div>
    <div class="transcript" id="out"></div>
  </section>

  <footer>Captions enabled videos par hi kaam karta hai &middot; YouTube Transcript Tool v2</footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const urlEl = $("url"), goEl = $("go"), tsEl = $("ts"), langEl = $("lang");
  const errEl = $("err"), loadEl = $("loading"), resEl = $("result");
  const outEl = $("out"), metaEl = $("meta"), copyEl = $("copy"), dlEl = $("download");

  let current = { segments: [], plain: "", videoId: "" };

  function showErr(m) {
    errEl.textContent = m;
    errEl.className = "msg err";
  }
  function clearErr() { errEl.className = "msg"; }

  function countWords(text) {
    return text.trim().split(/\s+/).filter(Boolean).length;
  }

  function render() {
    const withTs = tsEl.checked;
    if (withTs) {
      outEl.classList.remove("plain");
      outEl.innerHTML = current.segments.map(s =>
        `<div class="line"><span class="t">${s.time}</span><span class="x">${escapeHtml(s.text)}</span></div>`
      ).join("");
    } else {
      outEl.classList.add("plain");
      outEl.textContent = current.plain;
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  async function fetchTranscript() {
    const url = urlEl.value.trim();
    if (!url) { showErr("Pehle link paste karo."); return; }
    clearErr();
    resEl.classList.remove("on");
    loadEl.classList.add("on");
    goEl.disabled = true;
    goEl.textContent = "La raha hoon…";

    try {
      const r = await fetch("/api/transcript", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, lang: langEl.value || undefined }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Kuch ghalat ho gaya.");

      current = data;
      const words = countWords(data.plain);
      const dur = data.segments.length > 0
        ? Math.round(data.segments[data.segments.length - 1].offset / 60) + " min"
        : "";
      metaEl.innerHTML = `Video <b>${data.videoId}</b> · ${data.count} lines · ~${words.toLocaleString()} words${dur ? " · " + dur : ""}`;
      render();
      resEl.classList.add("on");
    } catch (e) {
      showErr(e.message);
    } finally {
      loadEl.classList.remove("on");
      goEl.disabled = false;
      goEl.textContent = "Transcript banao →";
    }
  }

  function getText() {
    return tsEl.checked
      ? current.segments.map(s => `[${s.time}] ${s.text}`).join("\n")
      : current.plain;
  }

  goEl.addEventListener("click", fetchTranscript);
  urlEl.addEventListener("keydown", e => { if (e.key === "Enter") fetchTranscript(); });
  tsEl.addEventListener("change", () => { if (current.segments.length) render(); });

  copyEl.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(getText());
      copyEl.textContent = "✅ Copied!";
      setTimeout(() => copyEl.textContent = "📋 Copy", 1800);
    } catch { showErr("Copy nahi ho saka."); }
  });

  dlEl.addEventListener("click", () => {
    const blob = new Blob([getText()], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `transcript_${current.videoId || "yt"}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // Paste from clipboard on focus if empty
  urlEl.addEventListener("focus", async () => {
    if (urlEl.value) return;
    try {
      const text = await navigator.clipboard.readText();
      if (text && (text.includes("youtube.com") || text.includes("youtu.be"))) {
        urlEl.value = text;
      }
    } catch (_) {}
  });
</script>
</body>
</html>
