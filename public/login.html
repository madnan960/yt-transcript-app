<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Transcribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0908;--surface:#13100e;--line:#2a2420;--ink:#f3ede4;--muted:#a89e90;--faint:#6f655a;--accent:#ff6a4d;--accent-soft:#ff6a4d22}
body{background:var(--bg);color:var(--ink);font-family:"Inter",sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px clamp(20px,5vw,80px);border-bottom:1px solid var(--line)}
.logo{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:22px;text-decoration:none;color:var(--ink)}
.logo span{color:var(--accent)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:clamp(28px,4vw,48px);width:100%;max-width:420px}
.card-title{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:28px;letter-spacing:-.02em;margin-bottom:8px}
.card-sub{color:var(--muted);font-size:15px;margin-bottom:32px}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:transparent;font-family:"Inter"}
.tab.active{background:var(--accent);color:#1a0d08}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:600;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);font-size:16px;padding:13px 16px;border-radius:12px;font-family:"Inter";transition:border-color .15s}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
input::placeholder{color:var(--faint)}
.btn{width:100%;background:var(--accent);color:#1a0d08;border:none;font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;padding:14px;border-radius:12px;cursor:pointer;margin-top:8px;transition:filter .15s}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--faint);font-size:13px}
.divider::before,.divider::after{content:"";flex:1;border-top:1px solid var(--line)}
.btn-google{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);font-family:"Inter";font-weight:600;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s}
.btn-google:hover{border-color:var(--accent)}
.msg{margin-top:14px;padding:12px 16px;border-radius:10px;font-size:14px;display:none}
.msg.err{display:block;background:#ff6a4d15;border:1px solid #ff6a4d44;color:#ffb9a8}
.msg.ok{display:block;background:#7bd88f15;border:1px solid #7bd88f44;color:#7bd88f}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Trans<span>cribe</span></a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-title" id="card-title">Welcome back</div>
    <div class="card-sub" id="card-sub">Sign in to your account</div>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="setMode('login')">Login</button>
      <button class="tab" id="tab-signup" onclick="setMode('signup')">Sign Up</button>
    </div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
    <button class="btn" id="submit-btn" onclick="handleAuth()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.5 2.6 13.5l7.9 6.1C12.4 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.8-2.1 5.1-4.5 6.7l7 5.4c4.1-3.8 6.3-9.4 6.3-16.1z"/><path fill="#FBBC05" d="M10.5 28.4c-.5-1.4-.8-2.9-.8-4.4s.3-3 .8-4.4l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.5l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7-5.4c-2 1.4-4.6 2.2-8.2 2.2-6.3 0-11.6-3.7-13.5-9l-7.9 6.1C6.6 42.5 14.6 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
const SUPA_URL = "https://fosonevnuvcmrmqgsceh.supabase.co";
const SUPA_KEY = "sb_publishable_0Fqyk60LGARz_lUjlYX78w_3gcwYcIr";
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

var mode = "login";
var params = new URLSearchParams(window.location.search);
if (params.get("mode") === "signup") setMode("signup");

function setMode(m) {
  mode = m;
  document.getElementById("tab-login").classList.toggle("active", m === "login");
  document.getElementById("tab-signup").classList.toggle("active", m === "signup");
  document.getElementById("card-title").textContent = m === "login" ? "Welcome back" : "Create account";
  document.getElementById("card-sub").textContent = m === "login" ? "Sign in to your account" : "Start for free today";
  document.getElementById("submit-btn").textContent = m === "login" ? "Sign In" : "Create Account";
}

function showMsg(text, type) {
  var el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
}

async function handleAuth() {
  var email = document.getElementById("email").value.trim();
  var password = document.getElementById("password").value;
  var btn = document.getElementById("submit-btn");
  if (!email || !password) { showMsg("Please fill all fields.", "err"); return; }
  btn.disabled = true;
  btn.textContent = "Please wait...";
  try {
    var result;
    if (mode === "login") {
      result = await supabase.auth.signInWithPassword({ email, password });
    } else {
      result = await supabase.auth.signUp({ email, password });
    }
    if (result.error) throw result.error;
    if (mode === "signup") {
      showMsg("Account created! Check your email to verify.", "ok");
    } else {
      window.location.href = "/app.html";
    }
  } catch(e) {
    showMsg(e.message || "Something went wrong.", "err");
  } finally {
    btn.disabled = false;
    btn.textContent = mode === "login" ? "Sign In" : "Create Account";
  }
}

async function handleGoogle() {
  var result = await supabase.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + "/app.html" } });
  if (result.error) showMsg(result.error.message, "err");
}

document.getElementById("email").addEventListener("keydown", function(e) { if (e.key === "Enter") handleAuth(); });
document.getElementById("password").addEventListener("keydown", function(e) { if (e.key === "Enter") handleAuth(); });

// Check if already logged in
supabase.auth.getSession().then(function({ data }) {
  if (data.session) window.location.href = "/app.html";
});
</script>
</body>
</html>
